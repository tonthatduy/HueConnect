<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
        <!-- Embet Font -->
        <link
            href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400..700;1,400..700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
            rel="stylesheet"
        />

        <!-- CDN  -->
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
        />
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"
        />

        <!-- CSS -->
        <link rel="stylesheet" href="/css/style.css" />
    </head>
    <body>
        <header class="header section">
            <div class="container-full flex header-inner">
                <!-- logo -->
                <div class="logo">
                    <img
                        class="sf-header-logo"
                        src="https://aonetheme.com/demoimport/wp-content/uploads/2025/04/logo-dark.png"
                        alt="Service Finder"
                        title="Service Finder"
                    />
                </div>

                <!-- menu -->
                <nav class="menu">
                    <ul class="flex menu-inner">
                        <li class="active"><a href="#">Home</a></li>
                        <li><a href="#">Provider Page</a></li>
                        <li><a href="#">Provider Account</a></li>
                        <li><a href="#">Features</a></li>
                        <li><a href="#">Blog</a></li>
                        <li><a href="#">Contact Us</a></li>
                        <li><a href="#">Pages</a></li>
                        <li><a href="#">Explore Services</a></li>
                    </ul>
                </nav>

                <!-- actions -->
                <div class="actions flex">
                    <button class="btn btn-icon btn-secondary">
                        <svg
                            width="24px"
                            height="24px"
                            viewBox="0 0 24 24"
                            xmlns="http://www.w3.org/2000/svg"
                        >
                            <title />

                            <g id="Complete">
                                <g id="user">
                                    <g>
                                        <path
                                            d="M20,21V19a4,4,0,0,0-4-4H8a4,4,0,0,0-4,4v2"
                                            fill="none"
                                            stroke="#000000"
                                            stroke-linecap="round"
                                            stroke-linejoin="round"
                                            stroke-width="2"
                                        />

                                        <circle
                                            cx="12"
                                            cy="7"
                                            fill="none"
                                            r="4"
                                            stroke="#000000"
                                            stroke-linecap="round"
                                            stroke-linejoin="round"
                                            stroke-width="2"
                                        />
                                    </g>
                                </g>
                            </g>
                        </svg>
                    </button>
                    <button class="btn btn-secondary">Post a Task</button>
                    <button class="btn btn-primary">AI Chat</button>
                </div>
            </div>
        </header>

</html>
